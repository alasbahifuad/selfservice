<body class="antialiased min-h-screen bg-gradient-to-br from-primary to-primary-container flex items-center justify-center m-0 p-0 font-body overflow-hidden relative">
<!-- Decorative ambient shapes for depth -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-white/5 blur-3xl"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-black/5 blur-3xl"></div>
</div>

<div class="relative z-10 flex flex-col items-center justify-center text-center p-8">

<div class="mb-8 relative flex items-center justify-center">
<!-- Outer Glow / Halo -->
<div class="absolute inset-0 bg-white/20 rounded-full blur-2xl scale-150"></div>
<!-- Icon Background -->
<div class="bg-white/10 p-6 rounded-[2rem] shadow-[0_8px_32px_rgba(0,0,0,0.1)] backdrop-blur-md border border-white/20 relative z-10">
<span class="material-symbols-outlined text-[5rem] md:text-[6rem] text-white block">
                    support_agent
                </span>
</div>
</div>

<div class="w-24 h-px mx-auto mb-4 bg-[#FF8C00]"></div><p class="font-label text-sm md:text-base font-medium text-[#00174a]">
