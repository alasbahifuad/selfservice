<main class="flex-grow flex flex-col items-center justify-start px-6 pt-8 gap-8 max-w-4xl mx-auto w-full">
<!-- Time & Date Card -->
<section class="w-full bg-surface-container-lowest rounded-xl p-8 flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative gradient background -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-fixed to-surface-container-lowest opacity-30 z-0"></div>
<div class="z-10 text-center">
<h1 class="text-5xl font-bold text-primary mb-2 tracking-tight" style="font-family: 'Plus Jakarta Sans', sans-serif;">08:45 AM</h1>
<p class="text-lg text-on-surface-variant font-medium">الخميس، 24 أكتوبر 2023</p>
</div>
</section>

<div class="inline-flex items-center gap-3 bg-surface-container-lowest px-6 py-3 rounded-full shadow-[0_4px_12px_rgba(25,28,29,0.04)]">

<div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center mb-4 backdrop-blur-sm">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">login</span>
</div>
<span class="text-2xl font-bold">تسجيل حضور</span>
</button>

<button class="group flex flex-col items-center justify-center bg-surface-container-lowest text-on-surface border border-outline-variant/15 rounded-[2rem] p-8 h-48 relative overflow-hidden transition-transform active:scale-95 hover:bg-surface-container-low">
<div class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-secondary" style="font-variation-settings: 'FILL' 1;">logout</span>
</div>
<span class="text-2xl font-bold">تسجيل انصراف</span>
</button>

<h2 class="text-xl font-bold text-on-surface mb-6">ملخص اليوم</h2>

<div class="absolute right-9 top-10 bottom-10 w-1 bg-surface-variant rounded-full"></div>

<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center ring-4 ring-surface-container-low">

</div>
<div class="bg-surface-container-lowest rounded-xl p-4 flex-grow shadow-sm">
<div class="flex justify-between items-center mb-1">
<span class="font-bold text-on-surface">تسجيل حضور</span>
<span class="text-primary font-semibold">08:45 AM</span>
</div>
<p class="text-sm text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">location_on</span>
                 المقر الرئيسي الرياض
              </p>

</div>

<div class="flex items-center gap-6 opacity-60">
<div class="w-6 h-6 rounded-full bg-surface-variant flex items-center justify-center ring-4 ring-surface-container-low">
</div>
<div class="bg-surface-container-lowest rounded-xl p-4 flex-grow border border-dashed border-outline-variant">
<div class="flex justify-between items-center mb-1">
<span class="font-bold text-on-surface-variant">تسجيل انصراف</span>
<span class="text-on-surface-variant">--:--</span>
</div>

<span class="material-symbols-outlined text-2xl mb-1">notifications</span>
<span class="font-['Cairo'] text-xs font-medium">التنبيهات</span>
